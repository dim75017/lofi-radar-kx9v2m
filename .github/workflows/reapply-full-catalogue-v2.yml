name: Reapply full Spotify catalogue

on:
  push:
    branches: [agent/restore-full-track-catalogue-v2]
    paths:
      - '.github/workflows/reapply-full-catalogue-v2.yml'

permissions:
  contents: write

jobs:
  reapply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-full-track-catalogue-v2
          fetch-depth: 0
      - name: Revert the accidental catalogue rollback
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git revert --no-edit 37bd131222764994b6d68ed73d40b8227c376a11
          grep -F "const A = (D.artists || [])" spotify/dashboard.js
          grep -F "const DISCOVERY_CATALOGUE = SC&&SC.discovery_catalogue" spotify/dashboard.js
          grep -F "Spotify_Soundcharts_data_20260722T105508Z.js" spotify/index.html
          git push origin HEAD:agent/restore-full-track-catalogue-v2
