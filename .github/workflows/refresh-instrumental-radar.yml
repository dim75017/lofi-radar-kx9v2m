name: Refresh instrumental radar

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yt-dlp
      - run: python refresh_instrumental_extensions.py
        env:
          RADAR_SNAPSHOT: Lofi_Radar_data.js
      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Lofi_Radar_data.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh instrumental radar data"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep 5
          done
          exit 1
