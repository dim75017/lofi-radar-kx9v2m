name: Apply daily Soundcharts synchronization fix

on:
  pull_request:
    paths:
      - '.github/workflows/apply-soundcharts-daily-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconstruct the corrected collector and tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import re

          def restore(pattern: str, output: str, expected_sha256: str) -> None:
              parts = sorted(Path('.github/tmp').glob(pattern))
              if not parts:
                  raise SystemExit(f'No payload fragments matched {pattern}')
              encoded = ''.join(part.read_text(encoding='utf-8').strip() for part in parts)
              data = gzip.decompress(base64.b64decode(encoded))
              actual = hashlib.sha256(data).hexdigest()
              if actual != expected_sha256:
                  raise SystemExit(f'{output} checksum mismatch: {actual}')
              path = Path(output)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(data)
              print(f'Restored {output}: {len(data)} bytes, sha256={actual}')

          restore(
              'soundcharts-script-*.b64',
              'refresh_soundcharts_daily.py',
              '4d17b0a61796d1e80fe0036ceb2013e95ffe5574c816bc932d08115e978e56d9',
          )
          restore(
              'soundcharts-tests-*.b64',
              'tests/test_refresh_soundcharts_daily.py',
              '8e06a2fc4ef2dd282606e0fd46ff61468cb2c028f55ba52e5695abf51f4b98ab',
          )

          performance = Path('Spotify_Performance_data.js')
          if not performance.exists():
              performance.write_text(
                  'window.SPOTIFY_PERFORMANCE={"source":"soundcharts_daily","generated_at":null,"tracks":{},"artists":{},"playlists":{}};\n',
                  encoding='utf-8',
              )

          index = Path('spotify/index.html')
          html = index.read_text(encoding='utf-8')
          pattern = re.compile(
              r'<script src="\.\./Spotify_Radar_data\.js"></script>\s*'
              r'<script src="\.\./Spotify_Playlists_data\.js(?:\?[^\"]*)?"></script>\s*'
              r'<script src="\.\./Spotify_Labels_data\.js"></script>\s*'
              r'<script src="\.\./Spotify_Soundcharts_data\.js(?:\?[^\"]*)?"></script>'
          )
          replacement = '''<script src="../Spotify_Radar_data.js"></script>
          <script src="../Spotify_Labels_data.js"></script>
          <script>
          (()=>{
            const stamp=Date.now();
            [
              '../Spotify_Playlists_data.js?payload='+stamp,
              '../Spotify_Soundcharts_data.js?payload='+stamp,
              '../Spotify_Performance_data.js?payload='+stamp
            ].forEach(src=>document.write('<script src="'+src+'"><\\/script>'));
          })();
          </script>'''
          updated, count = pattern.subn(replacement, html, count=1)
          if count != 1:
              raise SystemExit(f'Expected one Spotify data-script block, replaced {count}')
          index.write_text(updated, encoding='utf-8')
          PY

      - name: Run collector unit tests
        run: python -m unittest tests/test_refresh_soundcharts_daily.py -v

      - name: Verify real Soundcharts artist and song metrics
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: python refresh_soundcharts_daily.py --mode smoke --max-requests 25 --history-days 14

      - name: Validate the browser history bridge
        shell: bash
        run: |
          python -m py_compile refresh_soundcharts_daily.py
          grep -q 'Spotify_Performance_data.js' spotify/index.html
          grep -q 'window.SPOTIFY_PERFORMANCE=' Spotify_Performance_data.js
          grep -q '/audience/spotify' refresh_soundcharts_daily.py
          if grep -q 'current/stats?period=1' refresh_soundcharts_daily.py; then
            echo 'Obsolete Soundcharts endpoint still present' >&2
            exit 1
          fi
          git diff --check

      - name: Commit only the final synchronization fix
        shell: bash
        run: |
          rm -rf .github/tmp
          rm -f .github/workflows/diagnose-soundcharts-daily.yml
          rm -f .github/workflows/apply-soundcharts-daily-fix.yml
          rm -f soundcharts-diagnostic.jsonl
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo 'No final changes to commit'; exit 1; }
          git commit -m "Fix daily Soundcharts stream synchronization"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
