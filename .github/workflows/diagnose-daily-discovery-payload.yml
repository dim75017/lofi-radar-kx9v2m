name: Diagnose daily discovery payload

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-daily-discovery-payload.yml'
  push:
    branches:
      - agent/daily-soundcharts-discovery
    paths:
      - '.github/workflows/diagnose-daily-discovery-payload.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/daily-soundcharts-discovery
      - name: Inspect every segment and reconstructed archive
        shell: bash
        run: |
          set +e
          {
            echo 'FILES'
            find .daily-discovery-payload -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
            echo 'HASHES'
            sha256sum .daily-discovery-payload/part-* | sort -k2
            echo 'ASSEMBLED LOGICAL PARTS'
            for logical in 00 01 02 03 04 05 06 07 08; do
              case "$logical" in
                02) cat .daily-discovery-payload/part-020 .daily-discovery-payload/part-021 .daily-discovery-payload/part-022 > "/tmp/part-$logical" ;;
                07) cat .daily-discovery-payload/part-070 .daily-discovery-payload/part-071 .daily-discovery-payload/part-072 > "/tmp/part-$logical" ;;
                *) cp ".daily-discovery-payload/part-$logical" "/tmp/part-$logical" ;;
              esac
              wc -c "/tmp/part-$logical"
              sha256sum "/tmp/part-$logical"
            done
            echo 'RECONSTRUCTION'
            cat /tmp/part-{00,01,02,03,04,05,06,07,08} > /tmp/payload.b64
            wc -c /tmp/payload.b64
            sha256sum /tmp/payload.b64
            base64 --decode /tmp/payload.b64 > /tmp/payload.tar.gz
            echo "base64_exit=$?"
            wc -c /tmp/payload.tar.gz
            sha256sum /tmp/payload.tar.gz
            gzip -t /tmp/payload.tar.gz
            echo "gzip_exit=$?"
            tar -tzf /tmp/payload.tar.gz
            echo "tar_exit=$?"
          } > payload-diagnostic.txt 2>&1
          cat payload-diagnostic.txt
      - uses: actions/upload-artifact@v4
        with:
          name: daily-discovery-payload-diagnostic
          path: payload-diagnostic.txt
          retention-days: 1
