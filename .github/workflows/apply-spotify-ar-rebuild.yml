name: Apply Spotify A&R engine rebuild

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-spotify-ar-rebuild.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconstruct the reviewed production patch
        shell: bash
        run: |
          set -euo pipefail
          cat .rebuild-payload/part-* > /tmp/spotify-ar-rebuild.b64
          base64 --decode /tmp/spotify-ar-rebuild.b64 > /tmp/spotify-ar-rebuild.tar.gz
          echo '022fa7bebdf024fc1a3934031bb9603534df284236629775bbdf9fbbc3a004a2  /tmp/spotify-ar-rebuild.tar.gz' | sha256sum -c -
          tar -xzf /tmp/spotify-ar-rebuild.tar.gz
          patch --batch --forward -p1 < patches/dashboard.patch
          patch --batch --forward -p1 < patches/dashboard-css.patch
          rm -rf patches .rebuild-payload

      - name: Run the complete A&R engine test suite
        run: >-
          python -m unittest
          tests/test_refresh_soundcharts_daily.py
          tests/test_expand_soundcharts_instrumental_pool.py
          tests/test_sync_soundcharts_opportunities.py
          -v

      - name: Validate source syntax and patch whitespace
        run: |
          python -m py_compile \
            refresh_soundcharts_daily.py \
            expand_soundcharts_instrumental_pool.py \
            sync_soundcharts_opportunities.py
          node --check spotify/dashboard.js
          git diff --check

      - name: Exercise real Soundcharts authentication and a measured expansion sample
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: |
          cp Spotify_Soundcharts_data.js /tmp/Spotify_Soundcharts_data.js
          cp Spotify_Performance_data.js /tmp/Spotify_Performance_data.js
          cp soundcharts-instrumental-cache.json /tmp/soundcharts-instrumental-cache.json
          python refresh_soundcharts_daily.py --mode smoke --max-requests 25 --history-days 14
          python expand_soundcharts_instrumental_pool.py --limit 20 --max-requests 120 --history-days 90 --workers 8
          python sync_soundcharts_opportunities.py \
            --max-artist-listeners 5000000 \
            --max-track-streams 250000000 \
            --max-opportunities 2000 \
            --minimum-score 20
          python3 - <<'PY'
          import json
          from pathlib import Path

          def load(path, prefix):
              raw = Path(path).read_text(encoding='utf-8')
              assert raw.startswith(prefix), path
              return json.loads(raw[len(prefix):].strip().removesuffix(';'))

          soundcharts = load('Spotify_Soundcharts_data.js', 'window.SPOTIFY_SOUNDCHARTS=')
          performance = load('Spotify_Performance_data.js', 'window.SPOTIFY_PERFORMANCE=')
          pool = soundcharts.get('instrumental_pool') or {}
          opportunities = soundcharts.get('opportunities') or []
          if int(pool.get('measured') or 0) < 1:
              raise SystemExit('No real Spotify stream counter was measured')
          if len(opportunities) <= 30:
              raise SystemExit(f'Dynamic opportunity pool did not expand: {len(opportunities)}')
          ids = [row[1] for row in opportunities]
          if len(ids) != len(set(ids)):
              raise SystemExit('Duplicate Spotify IDs in the opportunity list')
          if not performance.get('tracks'):
              raise SystemExit('Performance history is empty')
          print(json.dumps({
              'target_tracks': pool.get('target_tracks'),
              'measured': pool.get('measured'),
              'daily_delta_ready': pool.get('daily_delta_ready'),
              'opportunities': len(opportunities),
              'deal_types': (soundcharts.get('opportunity_scoring') or {}).get('deal_types'),
              'contacts': (soundcharts.get('opportunity_scoring') or {}).get('contacts'),
              'quota_remaining': pool.get('quota_remaining'),
          }, ensure_ascii=False))
          PY

      - name: Verify the rebuilt A&R page in Chrome
        run: |
          python -m pip install --disable-pip-version-check playwright
          python -m http.server 8765 >/tmp/spotify-radar-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          python3 - <<'PY'
          from playwright.sync_api import sync_playwright
          import shutil

          chrome = shutil.which('google-chrome') or shutil.which('chromium') or shutil.which('chromium-browser')
          if not chrome:
              raise SystemExit('Chrome/Chromium is unavailable')
          errors = []
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, executable_path=chrome, args=['--no-sandbox'])
              page = browser.new_page(viewport={'width': 1600, 'height': 1000})
              page.on('pageerror', lambda error: errors.append(str(error)))
              page.goto('http://127.0.0.1:8765/spotify/#opps', wait_until='domcontentloaded', timeout=120000)
              page.wait_for_timeout(18000)
              state = page.evaluate('''() => ({
                heading: document.querySelector('#view h2')?.textContent?.trim() || '',
                cards: document.querySelectorAll('.ar-opportunity-card').length,
                opportunities: (window.SPOTIFY_SOUNDCHARTS?.opportunities || []).length,
                performanceTracks: Object.keys(window.SPOTIFY_PERFORMANCE?.tracks || {}).length,
                body: (document.querySelector('#view')?.innerText || '').slice(0, 5000)
              })''')
              browser.close()
          if errors:
              raise SystemExit('JavaScript errors: ' + ' | '.join(errors[:10]))
          if state['heading'] != 'Opportunités de tracks A&R':
              raise SystemExit(f'Unexpected heading: {state}')
          if state['opportunities'] <= 30 or state['cards'] < 1:
              raise SystemExit(f'Dynamic A&R cards did not render: {state}')
          if state['performanceTracks'] < 1:
              raise SystemExit(f'Performance history did not load: {state}')
          if 'Distribution' not in state['body'] and 'Label + avance' not in state['body']:
              raise SystemExit(f'Deal-oriented UI is missing: {state}')
          print(state)
          PY

      - name: Produce the initial dynamic public shortlist from the validated existing history
        run: |
          cp /tmp/Spotify_Soundcharts_data.js Spotify_Soundcharts_data.js
          cp /tmp/Spotify_Performance_data.js Spotify_Performance_data.js
          printf '%s\n' '{"version":1,"tracks":{},"artists":{}}' > soundcharts-instrumental-cache.json
          python sync_soundcharts_opportunities.py \
            --max-artist-listeners 5000000 \
            --max-track-streams 250000000 \
            --max-opportunities 2000 \
            --minimum-score 20
          python3 - <<'PY'
          import json
          from pathlib import Path
          raw = Path('Spotify_Soundcharts_data.js').read_text(encoding='utf-8')
          payload = json.loads(raw[len('window.SPOTIFY_SOUNDCHARTS='):].strip().removesuffix(';'))
          opportunities = payload.get('opportunities') or []
          if len(opportunities) <= 30:
              raise SystemExit(f'Initial public shortlist is still too small: {len(opportunities)}')
          print(json.dumps({'initial_public_opportunities': len(opportunities), 'scoring': payload.get('opportunity_scoring')}, ensure_ascii=False))
          PY

      - name: Remove diagnostics and commit only production changes
        shell: bash
        run: |
          rm -f \
            .github/workflows/probe-soundcharts-song-pages.yml \
            .github/workflows/export-rebuild-source-bundle.yml \
            .github/workflows/export-rebuild-fixtures.yml \
            .github/workflows/probe-soundcharts-editorial-audience.yml \
            .github/workflows/probe-soundcharts-song-metadata.yml \
            .github/workflows/probe-soundcharts-artist-links.yml \
            .github/workflows/apply-spotify-ar-rebuild.yml \
            soundcharts-song-page-probe.json \
            soundcharts-editorial-audience-probe.json \
            soundcharts-song-metadata-probe.json \
            soundcharts-artist-links-probe.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Rebuild Spotify Radar as a dynamic A&R engine'
          for attempt in 1 2 3; do
            git pull --rebase origin '${{ github.event.pull_request.head.ref }}' && \
              git push origin HEAD:'${{ github.event.pull_request.head.ref }}' && exit 0
            sleep 5
          done
          exit 1
