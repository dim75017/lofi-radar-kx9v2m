name: Recover and split Spotify dashboard

on:
  pull_request:
    paths:
      - .github/scripts/refactor_spotify_dashboard.py
      - .github/workflows/refactor-spotify-dashboard.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore and externalize the dashboard assets
        run: python .github/scripts/refactor_spotify_dashboard.py

      - name: Validate generated files
        shell: bash
        run: |
          node --check spotify/dashboard.js
          python3 - <<'PY'
          from pathlib import Path
          html = Path('spotify/index.html').read_text(encoding='utf-8')
          css = Path('spotify/dashboard.css').read_text(encoding='utf-8')
          js = Path('spotify/dashboard.js').read_text(encoding='utf-8')
          assert 'Warning: truncated output' not in html
          assert 'Total output lines:' not in html
          assert '<link rel="stylesheet" href="dashboard.css">' in html
          assert '<script src="dashboard.js"></script>' in html
          assert len(html.splitlines()) < 180
          assert len(css) > 40000
          assert len(js) > 150000
          assert '</html>' in html
          print(f'index.html: {len(html.splitlines())} lines, {len(html.encode())} bytes')
          print(f'dashboard.css: {len(css.splitlines())} lines, {len(css.encode())} bytes')
          print(f'dashboard.js: {len(js.splitlines())} lines, {len(js.encode())} bytes')
          PY
          git diff --check

      - name: Load the restored dashboard in headless Chrome
        shell: bash
        run: |
          python3 -m http.server 8765 >/tmp/spotify-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8765/spotify/ >/dev/null && break
            sleep 0.5
          done
          chrome="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -n "$chrome"
          "$chrome" \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --virtual-time-budget=20000 \
            --enable-logging=stderr \
            --dump-dom \
            'http://127.0.0.1:8765/spotify/' \
            >/tmp/spotify-dom.html 2>/tmp/spotify-chrome.log
          python3 - <<'PY'
          from pathlib import Path
          import re
          dom = Path('/tmp/spotify-dom.html').read_text(encoding='utf-8', errors='replace')
          log = Path('/tmp/spotify-chrome.log').read_text(encoding='utf-8', errors='replace')
          assert 'Lofi Radar — Spotify' in dom
          assert 'id="view"' in dom
          assert 'Warning: truncated output' not in dom
          assert not re.search(r'Uncaught|SyntaxError|ReferenceError', log, re.I), log[-4000:]
          match = re.search(r'<div id="view"[^>]*>([\s\S]{20,})', dom)
          assert match, 'The Spotify view did not render content'
          print('Headless Chrome rendered the restored Spotify dashboard successfully.')
          PY

      - name: Commit only the final restored assets
        shell: bash
        run: |
          rm -f \
            .github/scripts/refactor_spotify_dashboard.py \
            .github/workflows/refactor-spotify-dashboard.yml \
            .github/workflows/inspect-spotify-dashboard.yml \
            spotify/asset-structure.txt \
            spotify/asset-structure-good.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Restore and split Spotify dashboard"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
