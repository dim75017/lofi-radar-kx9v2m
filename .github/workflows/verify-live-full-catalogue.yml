name: Verify live Spotify catalogue

on:
  push:
    branches: [agent/verify-live-full-catalogue]
    paths:
      - '.github/workflows/verify-live-full-catalogue.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verify-live-full-catalogue
          fetch-depth: 0

      - name: Wait for the restored GitHub Pages bundle
        shell: bash
        run: |
          set -euo pipefail
          url='https://dim75017.github.io/youtube-radar-kx9v2m/spotify/'
          for attempt in $(seq 1 90); do
            curl -fsSL -H 'Cache-Control: no-cache' "$url?verify=$GITHUB_SHA-$attempt" -o live-index.html || true
            if grep -q 'Spotify_Soundcharts_data_20260722T105508Z.js' live-index.html \
              && grep -q 'dashboard.js?v=20260722-full-catalogue-v2' live-index.html; then
              break
            fi
            if [[ "$attempt" == 90 ]]; then
              echo 'GitHub Pages still serves the reduced catalogue bundle.' >&2
              sed -n '25,105p' live-index.html >&2 || true
              exit 1
            fi
            sleep 10
          done

      - name: Render the public dashboard and extract page and sidebar counts
        shell: bash
        run: |
          set -euo pipefail
          chrome="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$chrome"
          "$chrome" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --virtual-time-budget=30000 \
            --dump-dom \
            "https://dim75017.github.io/youtube-radar-kx9v2m/spotify/?verify=$GITHUB_SHA#tracks" \
            > live-dom.html
          python3 - <<'PY'
          import datetime as dt
          import html
          import json
          import re
          from pathlib import Path

          index = Path('live-index.html').read_text(encoding='utf-8', errors='replace')
          dom = Path('live-dom.html').read_text(encoding='utf-8', errors='replace')

          def text_for(pattern: str, label: str) -> str:
              match = re.search(pattern, dom, re.S)
              if not match:
                  raise SystemExit(f'Rendered {label} was not found')
              return html.unescape(re.sub(r'<[^>]+>', '', match.group(1))).strip()

          page_text = text_for(
              r'<span[^>]+class="[^"]*result-count[^"]*"[^>]*>(.*?)</span>',
              'result-count',
          )
          number_match = re.search(r'([0-9][0-9\s\u00a0\u202f.,]*)\s+pistes', page_text, re.I)
          if not number_match:
              raise SystemExit(f'Could not parse the rendered track count: {page_text!r}')
          page_count = int(re.sub(r'\D', '', number_match.group(1)))
          if page_count < 45_000:
              raise SystemExit(f'Live dashboard still exposes only {page_count} tracks: {page_text}')

          sidebar_text = text_for(r'<span[^>]+id="c-opps"[^>]*>(.*?)</span>', 'sidebar track counter')
          compact = sidebar_text.casefold().replace('\u00a0', '').replace('\u202f', '').replace(' ', '').replace(',', '.')
          compact_match = re.fullmatch(r'([0-9]+(?:\.[0-9]+)?)([kmb])?', compact)
          if not compact_match:
              raise SystemExit(f'Could not parse sidebar count: {sidebar_text!r}')
          multiplier = {'k': 1_000, 'm': 1_000_000, 'b': 1_000_000_000}.get(compact_match.group(2), 1)
          sidebar_estimate = round(float(compact_match.group(1)) * multiplier)
          if sidebar_estimate < 45_000:
              raise SystemExit(
                  f'Sidebar still exposes only about {sidebar_estimate} tracks: {sidebar_text!r}; '
                  f'page result is {page_text!r}'
              )

          snapshot = re.search(r'Spotify_Soundcharts_data_[^?"\']+\.js', index)
          report = {
              'verified_at': dt.datetime.now(dt.timezone.utc).replace(microsecond=0).isoformat(),
              'url': 'https://dim75017.github.io/youtube-radar-kx9v2m/spotify/#tracks',
              'displayed_text': page_text,
              'displayed_track_count': page_count,
              'sidebar_text': sidebar_text,
              'sidebar_estimated_track_count': sidebar_estimate,
              'snapshot': snapshot.group(0) if snapshot else None,
              'dashboard_bundle': '20260722-full-catalogue-v2',
              'status': 'success',
          }
          Path('live-catalogue-verification.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Record the public verification
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-catalogue-verification.json
          git commit -m 'Record live full catalogue and sidebar verification'
          git push origin HEAD:agent/verify-live-full-catalogue
