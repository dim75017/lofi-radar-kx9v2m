name: Probe live Soundcharts discography totals

on:
  pull_request:
    paths:
      - .github/workflows/count-live-soundcharts-totals.yml

permissions:
  contents: write

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Count songs reported by Soundcharts for every mapped artist
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations
          import concurrent.futures
          import json
          import os
          import threading
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from collections import Counter
          from pathlib import Path

          API='https://customer.api.soundcharts.com'
          PREFIX='window.SPOTIFY_SOUNDCHARTS='
          app_id=os.environ.get('SOUNDCHARTS_CLIENT_ID','').strip().strip('"\'')
          api_key=os.environ.get('SOUNDCHARTS_CLIENT_SECRET','').strip().strip('"\'')
          if not app_id or not api_key:
              raise SystemExit('Soundcharts credentials are missing')

          raw=Path('Spotify_Soundcharts_data.js').read_text(encoding='utf-8')
          payload=json.loads(raw[len(PREFIX):].strip().removesuffix(';'))
          schema=list(payload.get('schemas',{}).get('artists',[]))
          rows=payload.get('artists',[])
          def value(row,name):
              try: i=schema.index(name)
              except ValueError: return None
              return row[i] if i<len(row) else None
          artists=[]; seen=set()
          for row in rows:
              uuid=str(value(row,'soundcharts_uuid') or '').strip()
              name=str(value(row,'name') or '').strip()
              if uuid and uuid not in seen:
                  seen.add(uuid); artists.append((uuid,name))
          if not artists:
              raise SystemExit('No mapped Soundcharts artists')

          headers={'x-app-id':app_id,'x-api-key':api_key,'Accept':'application/json','User-Agent':'Lofi-Radar-Catalog-Count/1.0'}
          lock=threading.Lock(); rate_lock=threading.Lock(); next_call=0.0
          requests=0; quota=None
          def throttle():
              global next_call
              with rate_lock:
                  now=time.monotonic(); target=max(now,next_call); next_call=target+0.025; delay=target-now
              if delay>0: time.sleep(delay)
          def get(path,retries=4):
              global requests,quota
              last=None
              for attempt in range(retries):
                  throttle()
                  with lock: requests+=1
                  req=urllib.request.Request(API+path,headers=headers)
                  try:
                      with urllib.request.urlopen(req,timeout=45) as response:
                          body=json.loads(response.read().decode('utf-8'))
                          q=response.headers.get('x-quota-remaining') or response.headers.get('X-Quota-Remaining')
                          try: q=int(q) if q is not None else None
                          except (TypeError,ValueError): q=None
                          if q is not None:
                              with lock: quota=q
                          return response.status,body
                  except urllib.error.HTTPError as exc:
                      if exc.code in {400,401,403,404}:
                          try: body=json.loads(exc.read().decode('utf-8'))
                          except Exception: body=None
                          return exc.code,body
                      last=exc
                  except Exception as exc:
                      last=exc
                  time.sleep(min(12,1.5*(attempt+1)))
              raise RuntimeError(type(last).__name__ if last else 'request_failed')

          # Probe the account-level priority list as an independent account check.
          favorite_probe={}
          try:
              status,body=get('/api/v2/favorite/artists?offset=0&limit=20')
              favorite_probe={'status':status,'total':(body.get('page') or {}).get('total') if isinstance(body,dict) else None}
          except Exception as exc:
              favorite_probe={'error':type(exc).__name__}

          def count_artist(entry):
              uuid,name=entry
              query=urllib.parse.urlencode({'offset':0,'limit':1,'sortBy':'releaseDate','sortOrder':'desc'})
              try:
                  status,body=get(f'/api/v2/artist/{urllib.parse.quote(uuid)}/songs?{query}')
              except Exception as exc:
                  return {'uuid':uuid,'name':name,'status':'exception','error':type(exc).__name__,'total':0}
              page=body.get('page') if isinstance(body,dict) else None
              total=page.get('total') if isinstance(page,dict) else None
              return {'uuid':uuid,'name':name,'status':status,'total':int(total) if isinstance(total,(int,float)) else 0,'keys':sorted(body.keys()) if isinstance(body,dict) else []}

          results=[]
          with concurrent.futures.ThreadPoolExecutor(max_workers=12) as pool:
              futures=[pool.submit(count_artist,entry) for entry in artists]
              for index,future in enumerate(concurrent.futures.as_completed(futures),1):
                  results.append(future.result())
                  if index%250==0:
                      print(json.dumps({'processed':index,'artists':len(artists),'requests':requests,'quota_remaining':quota}))

          ok=[row for row in results if row.get('status')==200]
          totals=[int(row.get('total') or 0) for row in ok]
          ranked=sorted(ok,key=lambda row:int(row.get('total') or 0),reverse=True)
          report={
              'generated_at':time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),
              'source':'live_soundcharts_api',
              'endpoint':'/api/v2/artist/{uuid}/songs?limit=1',
              'artists_queried':len(artists),
              'status_counts':dict(Counter(str(row.get('status')) for row in results)),
              'artists_successful':len(ok),
              'sum_of_page_totals':sum(totals),
              'mean_songs_per_artist':round(sum(totals)/len(totals),2) if totals else None,
              'median_songs_per_artist':sorted(totals)[len(totals)//2] if totals else None,
              'maximum_songs_for_one_artist':max(totals) if totals else None,
              'artists_over_100':sum(total>100 for total in totals),
              'artists_over_500':sum(total>500 for total in totals),
              'artists_over_1000':sum(total>1000 for total in totals),
              'largest_discographies':[{k:row.get(k) for k in ('uuid','name','total')} for row in ranked[:30]],
              'requests_used':requests,
              'quota_remaining':quota,
              'favorite_artist_probe':favorite_probe,
              'existing_export_coverage':payload.get('coverage',{}),
              'current_export_track_rows':len(payload.get('tracks',[])),
          }
          Path('soundcharts-live-total-count.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False))
          PY

      - name: Commit live count
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soundcharts-live-total-count.json
          git diff --cached --quiet && exit 0
          git commit -m "Record live Soundcharts discography totals"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
