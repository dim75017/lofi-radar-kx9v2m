name: Update full catalogue restoration branch

on:
  push:
    branches: [agent/restore-full-track-catalogue]
    paths: ['.github/workflows/rebase-full-catalogue.yml']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-full-track-catalogue
          fetch-depth: 0
      - name: Merge current main while retaining validated full snapshot
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            git checkout --ours spotify/index.html
            git add spotify/index.html
            git commit --no-edit
          fi
          rm -f .github/workflows/rebase-full-catalogue.yml
          git add -A
          git commit -m 'Update full catalogue restoration against latest main' || true
          python3 - <<'PY'
          import json,re
          from pathlib import Path
          index=Path('spotify/index.html').read_text(encoding='utf-8')
          assert 'Spotify_Soundcharts_data_20260722T105508Z.js' in index
          assert '20260722-full-catalogue-v2' in index
          raw=Path('Spotify_Soundcharts_data_20260722T105508Z.js').read_text(encoding='utf-8')
          sc=json.loads(raw[raw.find('{'):].strip().removesuffix(';'))
          assert len((sc.get('discovery_catalogue') or {}).get('tracks') or []) == 17998
          PY
          node --check spotify/dashboard.js
          git push origin HEAD:agent/restore-full-track-catalogue
